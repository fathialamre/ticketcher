name: ticketcher
description: "A Flutter package for creating beautiful ticket-style cards with customizable borders, dividers, and patterns. Perfect for event tickets, boarding passes, and coupons."
version: 2.0.0
homepage: https://github.com/fathialamre/ticketcher
repository: https://github.com/fathialamre/ticketcher
topics:
  - ticket
  - coupon
  - custom-clipper
  - boarding-pass
  - event-ticket

screenshots:
  - description: "Concert ticket with wave divider"
    path: screenshots/horizontal_1.jpeg
  - description: "Flight boarding pass with dashed divider"
    path: screenshots/flight.jpeg
  - description: "Gradient background ticket"
    path: screenshots/gradient_background.png
  - description: "Multiple section ticket with notches"
    path: screenshots/flight_multiple_section.jpeg
  - description: "Holographic / glassmorphism effects"
    path: screenshots/holograplic_effects.png

environment:
  sdk: ^3.7.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
